name: Update World Cup Bracket

on:
  schedule:
    - cron: '*/10 10-23 * 6-7 *'
    - cron: '*/10 0-6 * 6-7 *'
  workflow_dispatch:

jobs:
  update-bracket:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Fetch ESPN and update data
        run: |
          node << 'EOF'
          const fs = require('fs');
          const https = require('https');

          // Team name normalization from ESPN to our JSON format
          const ESPN_TO_JSON = {
            'United States': 'USA',
            'Korea Republic': 'South Korea',
            "Côte d'Ivoire": 'Ivory Coast',
            'Bosnia-Herzegovina': 'Bosnia',
            'Bosnia and Herzegovina': 'Bosnia',
            'Congo DR': 'DR Congo',
            'Cabo Verde': 'Cape Verde'
          };

          const LIVE_STATUSES = [
            'STATUS_IN_PROGRESS', 'STATUS_HALFTIME',
            'STATUS_FIRST_HALF', 'STATUS_SECOND_HALF', 'STATUS_END_PERIOD',
            'STATUS_SHOOTOUT'
          ];

          const FINAL_STATUSES = [
            'STATUS_FULL_TIME', 'STATUS_FINAL', 'STATUS_FINAL_AET', 'STATUS_FINAL_PEN',
            'STATUS_OVERTIME', 'STATUS_END_OF_EXTRATIME'
          ];

          function fetchJson(url) {
            return new Promise((resolve, reject) => {
              https.get(url, (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  try {
                    resolve(JSON.parse(data));
                  } catch (e) {
                    reject(new Error('Failed to parse JSON: ' + e.message));
                  }
                });
              }).on('error', reject);
            });
          }

          function normalizeName(name) {
            return ESPN_TO_JSON[name] || name;
          }

          // Update match scores from ESPN scoreboard
          async function updateMatches(matchesJson) {
            console.log('Fetching ESPN World Cup scoreboard...');
            
            let espnData;
            try {
              espnData = await fetchJson('https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard');
            } catch(e) {
              console.log('Failed to fetch ESPN scoreboard:', e.message);
              return false;
            }

            if (!espnData.events || espnData.events.length === 0) {
              console.log('No events found');
              return false;
            }

            console.log('Found ' + espnData.events.length + ' events');
            let anyUpdates = false;

            for (const event of espnData.events) {
              const comp = event.competitions && event.competitions[0];
              if (!comp) continue;

              const status = comp.status && comp.status.type && comp.status.type.name;
              const home = comp.competitors && comp.competitors.find(c => c.homeAway === 'home');
              const away = comp.competitors && comp.competitors.find(c => c.homeAway === 'away');

              if (!home || !away) continue;

              const espnHomeName = normalizeName(home.team.displayName || home.team.name);
              const espnAwayName = normalizeName(away.team.displayName || away.team.name);
              const homeScore = parseInt(home.score) || 0;
              const awayScore = parseInt(away.score) || 0;
              const homeWinner = home.winner;
              const awayWinner = away.winner;

              console.log('ESPN: ' + espnHomeName + ' ' + homeScore + ' - ' + awayScore + ' ' + espnAwayName + ' [' + status + ']');

              const isLive = LIVE_STATUSES.includes(status);
              const isFinal = FINAL_STATUSES.includes(status);

              if (!isLive && !isFinal) {
                console.log('  -> Skipping (not live/final)');
                continue;
              }

              // Find matching match in JSON
              let foundMatch = null;
              for (const [roundKey, roundMatches] of Object.entries(matchesJson.matches)) {
                for (const match of roundMatches) {
                  if (!match.homeTeam || !match.awayTeam) continue;
                  
                  const jsonHome = match.homeTeam.name;
                  const jsonAway = match.awayTeam.name;
                  
                  if ((jsonHome === espnHomeName && jsonAway === espnAwayName) ||
                      (jsonHome === espnAwayName && jsonAway === espnHomeName)) {
                    
                    if (match.status === 'completed' && match.homeScore !== null) {
                      const reversed = jsonHome === espnAwayName;
                      const expectedHome = reversed ? awayScore : homeScore;
                      const expectedAway = reversed ? homeScore : awayScore;
                      
                      if (match.homeScore !== expectedHome || match.awayScore !== expectedAway) {
                        continue;
                      }
                    }
                    
                    foundMatch = match;
                    break;
                  }
                }
                if (foundMatch) break;
              }

              if (!foundMatch) {
                console.log('  -> No matching match found');
                continue;
              }

              const reversed = foundMatch.homeTeam.name === espnAwayName;
              const newHomeScore = reversed ? awayScore : homeScore;
              const newAwayScore = reversed ? homeScore : awayScore;
              
              const needsUpdate = foundMatch.homeScore !== newHomeScore ||
                                  foundMatch.awayScore !== newAwayScore ||
                                  (isLive && foundMatch.status !== 'live') ||
                                  (isFinal && foundMatch.status !== 'completed');

              if (!needsUpdate) {
                console.log('  -> No update needed for ' + foundMatch.id);
                continue;
              }

              foundMatch.homeScore = newHomeScore;
              foundMatch.awayScore = newAwayScore;
              foundMatch.status = isFinal ? 'completed' : 'live';

              if (isFinal) {
                if (reversed) {
                  foundMatch.winner = awayWinner ? 'home' : homeWinner ? 'away' : null;
                } else {
                  foundMatch.winner = homeWinner ? 'home' : awayWinner ? 'away' : null;
                }
                
                if (!foundMatch.winner && newHomeScore !== newAwayScore) {
                  foundMatch.winner = newHomeScore > newAwayScore ? 'home' : 'away';
                }
              }

              if (status === 'STATUS_FINAL_PEN') {
                foundMatch.notes = 'PKs';
              } else if (status === 'STATUS_FINAL_AET' || status === 'STATUS_OVERTIME') {
                foundMatch.notes = 'AET';
              }

              console.log('  -> Updated ' + foundMatch.id + ': ' + newHomeScore + '-' + newAwayScore);
              anyUpdates = true;
            }

            return anyUpdates;
          }

          // Update player stats from ESPN leaders API
          async function updateStats(statsJson) {
            console.log('\nFetching ESPN World Cup leaders...');
            
            let leadersData;
            try {
              leadersData = await fetchJson('https://site.api.espn.com/apis/v2/sports/soccer/fifa.world/leaders');
            } catch(e) {
              console.log('Failed to fetch ESPN leaders:', e.message);
              return false;
            }

            if (!leadersData.leaders || leadersData.leaders.length === 0) {
              console.log('No leaders data found');
              return false;
            }

            console.log('Found leaders data');
            let anyUpdates = false;

            // Find goals category
            const goalsLeaders = leadersData.leaders.find(l => 
              l.name === 'goals' || l.displayName === 'Goals' || l.abbreviation === 'G'
            );
            
            // Find assists category
            const assistsLeaders = leadersData.leaders.find(l => 
              l.name === 'assists' || l.displayName === 'Assists' || l.abbreviation === 'A'
            );

            if (goalsLeaders && goalsLeaders.leaders) {
              console.log('Processing ' + goalsLeaders.leaders.length + ' goal scorers');
              
              const newGoldenBoot = [];
              let rank = 0;
              let lastGoals = -1;
              
              for (let i = 0; i < Math.min(goalsLeaders.leaders.length, 20); i++) {
                const leader = goalsLeaders.leaders[i];
                const athlete = leader.athlete;
                const stats = leader.statistics || {};
                
                if (!athlete) continue;
                
                const goals = parseInt(leader.value || stats.goals || 0);
                const assists = parseInt(stats.assists || 0);
                const played = parseInt(stats.gamesPlayed || stats.appearances || 0);
                
                // Calculate rank (same goals = same rank)
                if (goals !== lastGoals) {
                  rank = i + 1;
                  lastGoals = goals;
                }
                
                const teamName = athlete.team ? (athlete.team.displayName || athlete.team.name) : 'Unknown';
                const teamCode = athlete.team ? (athlete.team.abbreviation || '') : '';
                
                newGoldenBoot.push({
                  rank: rank,
                  name: athlete.displayName || athlete.fullName,
                  country: normalizeName(teamName),
                  countryCode: teamCode,
                  flag: teamCode,
                  club: '', // ESPN doesn't provide club info in this endpoint
                  played: played,
                  goals: goals,
                  assists: assists
                });
              }
              
              if (newGoldenBoot.length > 0) {
                // Preserve club info from existing data
                for (const newPlayer of newGoldenBoot) {
                  const existing = statsJson.goldenBoot.find(p => 
                    p.name.toLowerCase() === newPlayer.name.toLowerCase() ||
                    p.name.includes(newPlayer.name.split(' ').pop())
                  );
                  if (existing && existing.club) {
                    newPlayer.club = existing.club;
                  }
                }
                
                statsJson.goldenBoot = newGoldenBoot;
                anyUpdates = true;
                console.log('Updated Golden Boot with ' + newGoldenBoot.length + ' players');
              }
            }

            if (assistsLeaders && assistsLeaders.leaders) {
              console.log('Processing ' + assistsLeaders.leaders.length + ' assist providers');
              
              const newAssists = [];
              let rank = 0;
              let lastAssists = -1;
              
              for (let i = 0; i < Math.min(assistsLeaders.leaders.length, 15); i++) {
                const leader = assistsLeaders.leaders[i];
                const athlete = leader.athlete;
                const stats = leader.statistics || {};
                
                if (!athlete) continue;
                
                const assists = parseInt(leader.value || stats.assists || 0);
                const goals = parseInt(stats.goals || 0);
                const played = parseInt(stats.gamesPlayed || stats.appearances || 0);
                
                if (assists !== lastAssists) {
                  rank = i + 1;
                  lastAssists = assists;
                }
                
                const teamName = athlete.team ? (athlete.team.displayName || athlete.team.name) : 'Unknown';
                const teamCode = athlete.team ? (athlete.team.abbreviation || '') : '';
                
                newAssists.push({
                  rank: rank,
                  name: athlete.displayName || athlete.fullName,
                  country: normalizeName(teamName),
                  countryCode: teamCode,
                  flag: teamCode,
                  club: '',
                  played: played,
                  assists: assists,
                  goals: goals
                });
              }
              
              if (newAssists.length > 0) {
                // Preserve club info
                for (const newPlayer of newAssists) {
                  const existing = statsJson.assists.find(p => 
                    p.name.toLowerCase() === newPlayer.name.toLowerCase() ||
                    p.name.includes(newPlayer.name.split(' ').pop())
                  );
                  if (existing && existing.club) {
                    newPlayer.club = existing.club;
                  }
                }
                
                statsJson.assists = newAssists;
                anyUpdates = true;
                console.log('Updated Assists with ' + newAssists.length + ' players');
              }
            }

            // Update star players from the combined data
            if (anyUpdates && statsJson.goldenBoot.length > 0) {
              const starNames = ['Messi', 'Mbappe', 'Mbappé', 'Ronaldo', 'Haaland', 'Vinicius', 'Kane', 'Bellingham', 'Yamal'];
              
              for (const star of statsJson.starPlayers) {
                const goldenBootEntry = statsJson.goldenBoot.find(p => 
                  starNames.some(n => p.name.includes(n) && star.name.includes(n))
                );
                
                if (goldenBootEntry) {
                  star.played = goldenBootEntry.played;
                  star.goals = goldenBootEntry.goals;
                  star.assists = goldenBootEntry.assists;
                }
              }
              console.log('Updated star players');
            }

            return anyUpdates;
          }

          async function main() {
            let matchesJson = JSON.parse(fs.readFileSync('data/matches.json', 'utf8'));
            let statsJson = JSON.parse(fs.readFileSync('data/stats.json', 'utf8'));
            
            const matchesUpdated = await updateMatches(matchesJson);
            const statsUpdated = await updateStats(statsJson);

            if (matchesUpdated || statsUpdated) {
              const now = new Date().toISOString();
              
              if (matchesUpdated) {
                matchesJson.lastUpdated = now;
                fs.writeFileSync('data/matches.json', JSON.stringify(matchesJson, null, 2));
                console.log('\nmatches.json updated');
              }
              
              if (statsUpdated) {
                statsJson.lastUpdated = now;
                fs.writeFileSync('data/stats.json', JSON.stringify(statsJson, null, 2));
                console.log('stats.json updated');
              }
            } else {
              console.log('\nNo updates needed');
            }
          }

          main().catch(e => console.error('Error:', e));
          EOF
      
      - name: Commit and push
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add data/matches.json data/stats.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update: $(TZ='Europe/Paris' date '+%Y-%m-%d %H:%M CET')" && git push)
