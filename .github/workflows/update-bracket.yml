name: Update World Cup Bracket

on:
  schedule:
    # Run every 10 minutes during match times (June 11 - July 19, 2026)
    - cron: '*/10 10-23 * 6-7 *'  # 10:00-23:00 UTC, June-July
    - cron: '*/10 0-6 * 6-7 *'    # 00:00-06:00 UTC, June-July (late matches)
  workflow_dispatch:  # Manual trigger

jobs:
  update-bracket:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Fetch ESPN data and update bracket
        run: |
          node << 'SCRIPT'
          const fs = require('fs');
          const https = require('https');

          // Team name mapping: ESPN name -> our HTML name
          const ESPN_TO_HTML = {
            'United States': 'USA',
            'Korea Republic': 'South Korea', 
            'Côte d\'Ivoire': 'Ivory Coast',
            'Bosnia-Herzegovina': 'Bosnia',
            'Bosnia and Herzegovina': 'Bosnia',
            'Congo DR': 'DR Congo',
            'Cabo Verde': 'Cape Verde',
            'Iran': 'Iran'
          };

          // Team code to flag emoji
          const FLAGS = {
            'USA': '🇺🇸', 'CAN': '🇨🇦', 'MEX': '🇲🇽', 'ARG': '🇦🇷', 'BRA': '🇧🇷',
            'FRA': '🇫🇷', 'GER': '🇩🇪', 'ENG': '🏴󠁧󠁢󠁥󠁮󠁧󠁿', 'ESP': '🇪🇸', 'POR': '🇵🇹',
            'NED': '🇳🇱', 'BEL': '🇧🇪', 'SUI': '🇨🇭', 'AUT': '🇦🇹', 'CRO': '🇭🇷',
            'NOR': '🇳🇴', 'SWE': '🇸🇪', 'MAR': '🇲🇦', 'SEN': '🇸🇳', 'EGY': '🇪🇬',
            'ALG': '🇩🇿', 'GHA': '🇬🇭', 'CIV': '🇨🇮', 'RSA': '🇿🇦', 'COD': '🇨🇩',
            'JPN': '🇯🇵', 'AUS': '🇦🇺', 'ECU': '🇪🇨', 'COL': '🇨🇴', 'PAR': '🇵🇾',
            'CPV': '🇨🇻', 'BIH': '🇧🇦', 'TUR': '🇹🇷'
          };

          // Fetch ESPN World Cup scoreboard
          function fetchESPN() {
            return new Promise((resolve, reject) => {
              https.get('https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard', (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  try {
                    resolve(JSON.parse(data));
                  } catch(e) {
                    reject(e);
                  }
                });
              }).on('error', reject);
            });
          }

          // Normalize team name from ESPN
          function normalizeName(espnName) {
            return ESPN_TO_HTML[espnName] || espnName;
          }

          // Update a match in the HTML
          function updateMatchInHTML(html, homeTeam, awayTeam, homeScore, awayScore, status, notes) {
            const homeName = normalizeName(homeTeam);
            const awayName = normalizeName(awayTeam);
            
            // Find the match block by looking for both team names
            // Match pattern: team names within same match div
            const matchPatterns = [
              // Pattern 1: home team followed by away team (standard order)
              new RegExp(
                `(<div class="match[^"]*">\\s*` +
                `<div class="team[^"]*"><span class="team-name"><span class="flag">[^<]+</span>\\s*${escapeRegex(homeName)}</span><span class="score">)[^<]*(</span></div>\\s*` +
                `<div class="team[^"]*"><span class="team-name"><span class="flag">[^<]+</span>\\s*${escapeRegex(awayName)}</span><span class="score">)[^<]*(</span></div>)`,
                'g'
              ),
              // Pattern 2: away team might be listed first (reverse check)
              new RegExp(
                `(<div class="match[^"]*">\\s*` +
                `<div class="team[^"]*"><span class="team-name"><span class="flag">[^<]+</span>\\s*${escapeRegex(awayName)}</span><span class="score">)[^<]*(</span></div>\\s*` +
                `<div class="team[^"]*"><span class="team-name"><span class="flag">[^<]+</span>\\s*${escapeRegex(homeName)}</span><span class="score">)[^<]*(</span></div>)`,
                'g'
              )
            ];

            let updated = false;
            
            for (const pattern of matchPatterns) {
              if (pattern.test(html)) {
                const isReversed = matchPatterns.indexOf(pattern) === 1;
                const score1 = isReversed ? awayScore : homeScore;
                const score2 = isReversed ? homeScore : awayScore;
                
                // Determine winner/loser classes
                let class1 = '', class2 = '';
                if (status === 'completed' && score1 !== null && score2 !== null) {
                  if (parseInt(score1) > parseInt(score2)) {
                    class1 = ' winner';
                    class2 = ' loser';
                  } else if (parseInt(score2) > parseInt(score1)) {
                    class1 = ' loser';
                    class2 = ' winner';
                  }
                }
                
                // Build replacement - this is simplified, actual implementation needs more work
                console.log(`Found match: ${homeName} vs ${awayName}, Score: ${homeScore}-${awayScore}, Status: ${status}`);
                updated = true;
                break;
              }
            }
            
            return { html, updated };
          }

          function escapeRegex(str) {
            return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          }

          // Main function
          async function main() {
            console.log('Fetching ESPN World Cup data...');
            
            let espnData;
            try {
              espnData = await fetchESPN();
            } catch(e) {
              console.log('Failed to fetch ESPN data:', e.message);
              process.exit(0);
            }

            if (!espnData.events || espnData.events.length === 0) {
              console.log('No events found in ESPN data');
              process.exit(0);
            }

            console.log(`Found ${espnData.events.length} events`);

            // Read current HTML
            let html = fs.readFileSync('index.html', 'utf8');
            let matchesJson = JSON.parse(fs.readFileSync('data/matches.json', 'utf8'));
            let anyUpdates = false;

            // Process each match from ESPN
            for (const event of espnData.events) {
              const competition = event.competitions?.[0];
              if (!competition) continue;

              const statusType = competition.status?.type?.name;
              const homeTeamData = competition.competitors?.find(c => c.homeAway === 'home');
              const awayTeamData = competition.competitors?.find(c => c.homeAway === 'away');

              if (!homeTeamData || !awayTeamData) continue;

              const homeName = homeTeamData.team?.displayName || homeTeamData.team?.name;
              const awayName = awayTeamData.team?.displayName || awayTeamData.team?.name;
              const homeScore = homeTeamData.score;
              const awayScore = awayTeamData.score;

              console.log(`ESPN: ${homeName} ${homeScore} - ${awayScore} ${awayName} [${statusType}]`);

              // Only process matches that are in progress or finished
              if (statusType === 'STATUS_IN_PROGRESS' || 
                  statusType === 'STATUS_HALFTIME' ||
                  statusType === 'STATUS_OVERTIME' ||
                  statusType === 'STATUS_FIRST_HALF' ||
                  statusType === 'STATUS_SECOND_HALF' ||
                  statusType === 'STATUS_END_PERIOD' ||
                  statusType === 'STATUS_FULL_TIME' ||
                  statusType === 'STATUS_FINAL' ||
                  statusType === 'STATUS_FINAL_AET' ||
                  statusType === 'STATUS_FINAL_PEN') {
                
                const normalizedHome = normalizeName(homeName);
                const normalizedAway = normalizeName(awayName);
                
                // Update matches.json
                for (const round of Object.values(matchesJson.matches)) {
                  for (const match of round) {
                    if (match.homeTeam && match.awayTeam) {
                      if ((match.homeTeam.name === normalizedHome && match.awayTeam.name === normalizedAway) ||
                          (match.homeTeam.name === normalizedAway && match.awayTeam.name === normalizedHome)) {
                        
                        const isReversed = match.homeTeam.name === normalizedAway;
                        match.homeScore = isReversed ? parseInt(awayScore) : parseInt(homeScore);
                        match.awayScore = isReversed ? parseInt(homeScore) : parseInt(awayScore);
                        match.status = statusType === 'STATUS_FINAL' ? 'completed' : 'live';
                        
                        if (statusType === 'STATUS_FINAL') {
                          match.winner = match.homeScore > match.awayScore ? 'home' : 
                                        match.awayScore > match.homeScore ? 'away' : 'draw';
                        }
                        
                        anyUpdates = true;
                        console.log(`  -> Updated match ${match.id}: ${match.homeScore}-${match.awayScore}`);
                      }
                    }
                  }
                }

                // Update HTML - find and replace score using simpler approach
                // Search for exact pattern: flag emoji + space + TeamName</span><span class="score">-</span>
                // This ensures we match "Australia" but not "Australia/EGY"
                
                // Build search patterns for home and away teams
                const homePattern = new RegExp(
                  `(>\\s*${escapeRegex(normalizedHome)}</span><span class="score">)[^<]*(</span>)`,
                  'g'
                );
                const awayPattern = new RegExp(
                  `(>\\s*${escapeRegex(normalizedAway)}</span><span class="score">)[^<]*(</span>)`,
                  'g'
                );
                
                let homeUpdated = false;
                let awayUpdated = false;
                
                // Update home team score
                if (homePattern.test(html)) {
                  html = html.replace(homePattern, `$1${homeScore}$2`);
                  homeUpdated = true;
                }
                
                // Update away team score  
                if (awayPattern.test(html)) {
                  html = html.replace(awayPattern, `$1${awayScore}$2`);
                  awayUpdated = true;
                }
                
                if (homeUpdated || awayUpdated) {
                  console.log(`  -> Updated HTML: ${normalizedHome}=${homeUpdated?homeScore:'FAILED'}, ${normalizedAway}=${awayUpdated?awayScore:'FAILED'}`);
                } else {
                  console.log(`  -> Could not find match in HTML for ${normalizedHome} vs ${normalizedAway}`);
                }
              }
            }

            if (anyUpdates) {
              // Update timestamp
              const now = new Date();
              const cetOptions = { 
                timeZone: 'Europe/Paris',
                month: 'long', day: 'numeric', year: 'numeric',
                hour: '2-digit', minute: '2-digit', hour12: false
              };
              const cetTime = now.toLocaleString('en-US', cetOptions).replace(',', '') + ' CET';
              
              html = html.replace(
                /Last updated:.*?(?=<|$)/,
                `Last updated: ${cetTime} - Auto-updated`
              );

              matchesJson.lastUpdated = now.toISOString();

              // Write files
              fs.writeFileSync('index.html', html);
              fs.writeFileSync('data/matches.json', JSON.stringify(matchesJson, null, 2));
              
              console.log('Files updated successfully');
            } else {
              console.log('No updates needed');
            }
          }

          main().catch(e => {
            console.error('Error:', e);
            process.exit(1);
          });
          SCRIPT
      
      - name: Commit and push if changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff --quiet && git diff --staged --quiet || (git commit -m "🏆 Auto-update: $(TZ='Europe/Paris' date '+%Y-%m-%d %H:%M CET')" && git push)
