name: Update World Cup Bracket

on:
  schedule:
    - cron: '*/10 10-23 * 6-7 *'
    - cron: '*/10 0-6 * 6-7 *'
  workflow_dispatch:

jobs:
  update-bracket:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Fetch ESPN and update scores
        run: |
          node << 'EOF'
          const fs = require('fs');
          const https = require('https');

          const ESPN_TO_HTML = {
            'United States': 'USA',
            'Korea Republic': 'South Korea',
            "Côte d'Ivoire": 'Ivory Coast',
            'Bosnia-Herzegovina': 'Bosnia',
            'Bosnia and Herzegovina': 'Bosnia',
            'Congo DR': 'DR Congo',
            'Cabo Verde': 'Cape Verde'
          };

          function fetchESPN() {
            return new Promise((resolve, reject) => {
              https.get('https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard', (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => resolve(JSON.parse(data)));
              }).on('error', reject);
            });
          }

          function normalizeName(name) {
            return ESPN_TO_HTML[name] || name;
          }

          function escapeRegex(str) {
            return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          }

          const LIVE_STATUSES = [
            'STATUS_IN_PROGRESS', 'STATUS_HALFTIME', 'STATUS_OVERTIME',
            'STATUS_FIRST_HALF', 'STATUS_SECOND_HALF', 'STATUS_END_PERIOD',
            'STATUS_END_OF_EXTRATIME', 'STATUS_FULL_TIME', 'STATUS_FINAL',
            'STATUS_FINAL_AET', 'STATUS_FINAL_PEN', 'STATUS_SHOOTOUT'
          ];

          async function main() {
            console.log('Fetching ESPN World Cup data...');
            
            let espnData;
            try {
              espnData = await fetchESPN();
            } catch(e) {
              console.log('Failed to fetch ESPN:', e.message);
              return;
            }

            if (!espnData.events || espnData.events.length === 0) {
              console.log('No events found');
              return;
            }

            console.log('Found ' + espnData.events.length + ' events');

            let html = fs.readFileSync('index.html', 'utf8');
            let matchesJson = JSON.parse(fs.readFileSync('data/matches.json', 'utf8'));
            let anyUpdates = false;

            for (const event of espnData.events) {
              const comp = event.competitions && event.competitions[0];
              if (!comp) continue;

              const status = comp.status && comp.status.type && comp.status.type.name;
              const home = comp.competitors && comp.competitors.find(c => c.homeAway === 'home');
              const away = comp.competitors && comp.competitors.find(c => c.homeAway === 'away');

              if (!home || !away) continue;

              const homeName = normalizeName(home.team.displayName || home.team.name);
              const awayName = normalizeName(away.team.displayName || away.team.name);
              const homeScore = home.score;
              const awayScore = away.score;

              console.log('ESPN: ' + homeName + ' ' + homeScore + ' - ' + awayScore + ' ' + awayName + ' [' + status + ']');

              if (LIVE_STATUSES.includes(status)) {
                // Update matches.json
                for (const roundKey of Object.keys(matchesJson.matches)) {
                  const round = matchesJson.matches[roundKey];
                  for (const match of round) {
                    if (match.homeTeam && match.awayTeam) {
                      const matchHome = match.homeTeam.name;
                      const matchAway = match.awayTeam.name;
                      
                      if ((matchHome === homeName && matchAway === awayName) ||
                          (matchHome === awayName && matchAway === homeName)) {
                        
                        const reversed = matchHome === awayName;
                        match.homeScore = reversed ? parseInt(awayScore) : parseInt(homeScore);
                        match.awayScore = reversed ? parseInt(homeScore) : parseInt(awayScore);
                        match.status = status.includes('FINAL') ? 'completed' : 'live';
                        
                        anyUpdates = true;
                        console.log('  -> Updated JSON: ' + match.id);
                      }
                    }
                  }
                }

                // Update HTML - search for exact team name ending with </span>
                // Pattern matches: TeamName</span><span class="score">X</span>
                const homeRegex = new RegExp(
                  '(>' + escapeRegex(homeName) + '</span><span class="score">)[^<]*(</span>)',
                  'g'
                );
                const awayRegex = new RegExp(
                  '(>' + escapeRegex(awayName) + '</span><span class="score">)[^<]*(</span>)',
                  'g'
                );

                const beforeLen = html.length;
                html = html.replace(homeRegex, '$1' + homeScore + '$2');
                html = html.replace(awayRegex, '$1' + awayScore + '$2');
                
                if (html.length !== beforeLen || html.includes(homeScore) || html.includes(awayScore)) {
                  console.log('  -> Updated HTML scores');
                  anyUpdates = true;
                }
              }
            }

            if (anyUpdates) {
              const now = new Date();
              const timeStr = now.toLocaleString('en-GB', {
                timeZone: 'Europe/Paris',
                day: 'numeric', month: 'long', year: 'numeric',
                hour: '2-digit', minute: '2-digit'
              }) + ' CET';
              
              html = html.replace(/Last updated:.*?(?=<)/g, 'Last updated: ' + timeStr + ' - Auto-updated');
              matchesJson.lastUpdated = now.toISOString();

              fs.writeFileSync('index.html', html);
              fs.writeFileSync('data/matches.json', JSON.stringify(matchesJson, null, 2));
              console.log('Files updated successfully');
            } else {
              console.log('No updates needed');
            }
          }

          main().catch(e => console.error('Error:', e));
          EOF
      
      - name: Commit and push
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add -A
          git diff --quiet && git diff --staged --quiet || (git commit -m "🏆 Auto-update: $(TZ='Europe/Paris' date '+%Y-%m-%d %H:%M CET')" && git push)
