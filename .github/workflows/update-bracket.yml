name: Update World Cup Bracket

on:
  schedule:
    - cron: '*/10 10-23 * 6-7 *'
    - cron: '*/10 0-6 * 6-7 *'
  workflow_dispatch:

jobs:
  update-bracket:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Fetch ESPN and update scores
        run: |
          node << 'EOF'
          const fs = require('fs');
          const https = require('https');

          const ESPN_TO_HTML = {
            'United States': 'USA',
            'Korea Republic': 'South Korea',
            "Côte d'Ivoire": 'Ivory Coast',
            'Bosnia-Herzegovina': 'Bosnia',
            'Bosnia and Herzegovina': 'Bosnia',
            'Congo DR': 'DR Congo',
            'Cabo Verde': 'Cape Verde'
          };

          // R16 placeholder mappings - which R32 match feeds which R16 slot
          const R16_MAPPINGS = {
            'Argentina/CV': { r32Home: 'Argentina', r32Away: 'Cape Verde' },
            'Australia/EGY': { r32Home: 'Australia', r32Away: 'Egypt' },
            'Colombia/GHA': { r32Home: 'Colombia', r32Away: 'Ghana' }
          };

          function fetchESPN() {
            return new Promise((resolve, reject) => {
              https.get('https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard', (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => resolve(JSON.parse(data)));
              }).on('error', reject);
            });
          }

          function normalizeName(name) {
            return ESPN_TO_HTML[name] || name;
          }

          function escapeRegex(str) {
            return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          }

          const LIVE_STATUSES = [
            'STATUS_IN_PROGRESS', 'STATUS_HALFTIME',
            'STATUS_FIRST_HALF', 'STATUS_SECOND_HALF', 'STATUS_END_PERIOD',
            'STATUS_SHOOTOUT'
          ];

          const FINAL_STATUSES = [
            'STATUS_FULL_TIME', 'STATUS_FINAL', 'STATUS_FINAL_AET', 'STATUS_FINAL_PEN',
            'STATUS_OVERTIME', 'STATUS_END_OF_EXTRATIME'
          ];

          async function main() {
            console.log('Fetching ESPN World Cup data...');
            
            let espnData;
            try {
              espnData = await fetchESPN();
            } catch(e) {
              console.log('Failed to fetch ESPN:', e.message);
              return;
            }

            if (!espnData.events || espnData.events.length === 0) {
              console.log('No events found');
              return;
            }

            console.log('Found ' + espnData.events.length + ' events');

            let html = fs.readFileSync('index.html', 'utf8');
            let matchesJson = JSON.parse(fs.readFileSync('data/matches.json', 'utf8'));
            let anyUpdates = false;

            for (const event of espnData.events) {
              const comp = event.competitions && event.competitions[0];
              if (!comp) continue;

              const status = comp.status && comp.status.type && comp.status.type.name;
              const home = comp.competitors && comp.competitors.find(c => c.homeAway === 'home');
              const away = comp.competitors && comp.competitors.find(c => c.homeAway === 'away');

              if (!home || !away) continue;

              const homeName = normalizeName(home.team.displayName || home.team.name);
              const awayName = normalizeName(away.team.displayName || away.team.name);
              const homeScore = home.score;
              const awayScore = away.score;
              const homeWinner = home.winner;
              const awayWinner = away.winner;

              console.log('ESPN: ' + homeName + ' ' + homeScore + ' - ' + awayScore + ' ' + awayName + ' [' + status + ']');
              if (homeWinner !== undefined) {
                console.log('  Winner: ' + (homeWinner ? homeName : awayWinner ? awayName : 'draw/pending'));
              }

              const isLive = LIVE_STATUSES.includes(status);
              const isFinal = FINAL_STATUSES.includes(status);

              if (isLive || isFinal) {
                // Determine winner
                let winnerName = null;
                if (isFinal) {
                  if (homeWinner) winnerName = homeName;
                  else if (awayWinner) winnerName = awayName;
                  else if (parseInt(homeScore) > parseInt(awayScore)) winnerName = homeName;
                  else if (parseInt(awayScore) > parseInt(homeScore)) winnerName = awayName;
                }

                // Update matches.json
                for (const roundKey of Object.keys(matchesJson.matches)) {
                  const round = matchesJson.matches[roundKey];
                  for (const match of round) {
                    if (match.homeTeam && match.awayTeam) {
                      const matchHome = match.homeTeam.name;
                      const matchAway = match.awayTeam.name;
                      
                      if ((matchHome === homeName && matchAway === awayName) ||
                          (matchHome === awayName && matchAway === homeName)) {
                        
                        const reversed = matchHome === awayName;
                        match.homeScore = reversed ? parseInt(awayScore) : parseInt(homeScore);
                        match.awayScore = reversed ? parseInt(homeScore) : parseInt(awayScore);
                        match.status = isFinal ? 'completed' : 'live';
                        if (winnerName) {
                          match.winner = winnerName === matchHome ? 'home' : 'away';
                        }
                        
                        anyUpdates = true;
                        console.log('  -> Updated JSON: ' + match.id);
                      }
                    }
                  }
                }

                // Build score display (with penalties if applicable)
                let homeDisplay = homeScore;
                let awayDisplay = awayScore;
                if (status === 'STATUS_FINAL_PEN') {
                  // Try to get penalty scores from the event details
                  const detail = comp.status && comp.status.type && comp.status.detail;
                  if (detail && detail.includes('(')) {
                    // Format like "1-1 (4-3 PEN)"
                    console.log('  Penalty detail: ' + detail);
                  }
                }

                // Update HTML scores
                const homeRegex = new RegExp(
                  '(>\\s*' + escapeRegex(homeName) + '</span><span class="score">)[^<]*(</span>)',
                  'g'
                );
                const awayRegex = new RegExp(
                  '(>\\s*' + escapeRegex(awayName) + '</span><span class="score">)[^<]*(</span>)',
                  'g'
                );

                html = html.replace(homeRegex, '$1' + homeDisplay + '$2');
                html = html.replace(awayRegex, '$1' + awayDisplay + '$2');

                // Update match status class (upcoming -> live or completed)
                // Find the match div containing both team names and update its class
                const matchDivRegex = new RegExp(
                  '(<div class="match )([^"]*)(">\\s*' +
                  '<div class="team[^"]*">.*?' + escapeRegex(homeName) + '.*?</div>\\s*' +
                  '<div class="team[^"]*">.*?' + escapeRegex(awayName) + '.*?</div>)',
                  'gs'
                );
                const matchDivRegex2 = new RegExp(
                  '(<div class="match )([^"]*)(">\\s*' +
                  '<div class="team[^"]*">.*?' + escapeRegex(awayName) + '.*?</div>\\s*' +
                  '<div class="team[^"]*">.*?' + escapeRegex(homeName) + '.*?</div>)',
                  'gs'
                );

                const newClass = isFinal ? 'completed' : 'live';
                html = html.replace(matchDivRegex, '$1' + newClass + '$3');
                html = html.replace(matchDivRegex2, '$1' + newClass + '$3');

                // Update winner/loser classes on team divs
                if (isFinal && winnerName) {
                  const loserName = winnerName === homeName ? awayName : homeName;
                  
                  // Add winner class
                  const winnerTeamRegex = new RegExp(
                    '(<div class="team)([^"]*)(">\\s*<span class="team-name">.*?' + escapeRegex(winnerName) + '</span>)',
                    'g'
                  );
                  html = html.replace(winnerTeamRegex, '$1 winner$3');
                  
                  // Add loser class
                  const loserTeamRegex = new RegExp(
                    '(<div class="team)([^"]*)(">\\s*<span class="team-name">.*?' + escapeRegex(loserName) + '</span>)',
                    'g'
                  );
                  html = html.replace(loserTeamRegex, '$1 loser$3');
                  
                  console.log('  -> Updated winner/loser styling');

                  // Update R16 placeholders with winner
                  for (const [placeholder, teams] of Object.entries(R16_MAPPINGS)) {
                    if ((teams.r32Home === homeName && teams.r32Away === awayName) ||
                        (teams.r32Home === awayName && teams.r32Away === homeName)) {
                      
                      // Replace placeholder with winner name
                      const placeholderRegex = new RegExp(escapeRegex(placeholder), 'g');
                      html = html.replace(placeholderRegex, winnerName);
                      console.log('  -> Updated R16: ' + placeholder + ' -> ' + winnerName);
                    }
                  }
                }

                console.log('  -> Updated HTML');
                anyUpdates = true;
              }
            }

            if (anyUpdates) {
              const now = new Date();
              const timeStr = now.toLocaleString('en-GB', {
                timeZone: 'Europe/Paris',
                day: 'numeric', month: 'long', year: 'numeric',
                hour: '2-digit', minute: '2-digit'
              }) + ' CET';
              
              html = html.replace(/Last updated:.*?(?=<)/g, 'Last updated: ' + timeStr + ' - Auto-updated');
              matchesJson.lastUpdated = now.toISOString();

              fs.writeFileSync('index.html', html);
              fs.writeFileSync('data/matches.json', JSON.stringify(matchesJson, null, 2));
              console.log('Files updated successfully');
            } else {
              console.log('No updates needed');
            }
          }

          main().catch(e => console.error('Error:', e));
          EOF
      
      - name: Commit and push
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add -A
          git diff --quiet && git diff --staged --quiet || (git commit -m "🏆 Auto-update: $(TZ='Europe/Paris' date '+%Y-%m-%d %H:%M CET')" && git push)
