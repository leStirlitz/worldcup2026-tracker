name: Update World Cup Bracket

on:
  schedule:
    - cron: '0 5 * * *'
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  update-bracket:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Update timestamp
        run: |
          CURRENT_DATE=$(TZ='Europe/Paris' date '+%B %d, %Y (%H:%M CET)')
          sed -i "s/Last updated:.*</Last updated: ${CURRENT_DATE} - Auto-updated</" index.html
          
      - name: Commit and push if changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update: $(date '+%Y-%m-%d %H:%M')" && git push)
